<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
        }
        button {
            padding: 10px 14px;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .task {
            word-break: break-word;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Todo App</h1>

    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter a task" required />
        <button type="submit">Add Task</button>
    </form>

    <ul>
        {% for todo in todos %}
        <li>
            <span class="task">{{ todo[1] }}</span>
            <form action="/delete/{{ todo[0] }}" method="post" style="margin: 0;">
                <button type="submit">Delete</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
